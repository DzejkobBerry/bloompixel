<div class="pricing-card {{#if featured}}featured{{/if}}">
    {{#if badge}}
    <div class="pricing-badge">{{badge}}</div>
    {{/if}}
    <div class="pricing-header">
        <h3>{{name}}</h3>
        <div class="price">
            <span class="amount">{{price}}</span>
            <span class="currency">{{currency}}</span>
        </div>
        <p class="price-description">{{description}}</p>
    </div>
    <div class="pricing-features">
        <ul>
            {{#each features}}
            <li>
                <i class="fas {{#if included}}fa-check{{else}}fa-times{{/if}}"></i> 
                {{text}}
            </li>
            {{/each}}
        </ul>
    </div>
    <div class="pricing-footer">
        <a href="#" class="btn {{#if featured}}btn-primary{{else}}btn-outline{{/if}}">Wybierz pakiet</a>
    </div>
</div>
