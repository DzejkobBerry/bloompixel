<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz wyceny - Hydroxy M&S</title>
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        
        input.error, select.error, textarea.error {
            border-color: #e74c3c;
        }
        
        .field-error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .form-message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .form-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .form-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .submit-button {
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .submit-button:hover {
            background-color: #0056b3;
        }
        
        .submit-button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Formularz wyceny</h2>
        
        <form id="quote-form" method="POST" action="https://formsubmit.co/info@hydroxyms.nl">
            <input type="hidden" name="_next" value="https://twojadomena.pl/thank-you.html">
            <input type="hidden" name="_subject" value="Nowe zapytanie o wycenę - Hydroxy M&S">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="true">
            
            <div class="form-message"></div>
            
            <div class="form-group">
                <label for="fullName">Imię i nazwisko *</label>
                <input type="text" id="fullName" name="fullName" required>
                <div class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="email">Adres email *</label>
                <input type="email" id="email" name="email" required>
                <div class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="phone">Numer telefonu *</label>
                <input type="tel" id="phone" name="phone" required>
                <div class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="area">Powierzchnia projektu (m²) *</label>
                <input type="number" id="area" name="area" min="0.1" step="0.1" required>
                <div class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="surface">Typ usługi *</label>
                <select id="surface" name="surface" required>
                    <option value="">Wybierz typ usługi</option>
                    <option value="waterproofing">Hydroizolacja</option>
                    <option value="epoxy resin floor">Podłoga żywiczna</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="date">Preferowana data rozpoczęcia *</label>
                <input type="date" id="date" name="date" required>
                <div class="field-error"></div>
            </div>
            
            <div class="form-group">
                <label for="details">Szczegóły projektu</label>
                <textarea id="details" name="details" rows="4" placeholder="Opisz szczegóły swojego projektu..."></textarea>
                <div class="field-error"></div>
            </div>
            
            <button type="submit" class="submit-button">Wyślij zapytanie</button>
        </form>
    </div>
    
    <script src="js/quote-form.js"></script>
</body>
</html>
